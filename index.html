<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>PushUp AI</title>

    <meta name="theme-color" content="#0b0d10">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>

<body>

<div id="app">

    <!-- Hintergrund -->
    <div id="background">
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>
        <div class="bg-light light1"></div>
        <div class="bg-light light2"></div>
    </div>

    <!-- Kamera -->
    <section id="cameraContainer">

        <video
            id="camera"
            autoplay
            muted
            playsinline>
        </video>

        <canvas id="overlay"></canvas>

    </section>

    <!-- Glass HUD -->
    <section id="hud">

        <!-- Rep-Kreis -->
        <div id="repCircle">

            <svg id="progressSVG" viewBox="0 0 120 120">

                <circle
                    class="track"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

                <circle
                    class="progress"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

            </svg>

            <div id="circleContent">

                <span id="repCount">0</span>

                <span id="repLabel">
                    REPS
                </span>

            </div>

        </div>

        <!-- Status -->
        <div id="statusGlass">

            <div id="statusText">
                Bereit
            </div>

            <div id="depthText">
                0 %
            </div>

        </div>

    </section>

    <!-- Countdown -->
    <div id="countdown">

        <span id="countdownNumber">
            3
        </span>

    </div>

    <!-- Startscreen -->
    <section id="startScreen">

        <div class="glassCard">

            <h1>

                PushUp AI

            </h1>

            <p>

                KI-gestützte Liegestütz-Erkennung

            </p>

            <button id="startButton">

                Training starten

            </button>

        </div>

    </section>

    <!-- Toast -->
    <div id="toast">

        <span id="toastText">

        </span>

    </div>

    <!-- Debug -->
    <section id="debugPanel">

        <div>

            FPS
            <span id="fps">
                --
            </span>

        </div>

        <div>

            Qualität
            <span id="quality">
                --
            </span>

        </div>

        <div>

            Tiefe
            <span id="depth">
                --
            </span>

        </div>

        <div>

            Phase
            <span id="phase">
                --
            </span>

        </div>

    </section>

</div>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<!-- Pose Detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<!-- Eigene Dateien -->
<script src="utils.js"></script>
<script src="animations.js"></script>
<script src="ui.js"></script>
<script src="calibration.js"></script>
<script src="detector.js"></script>
<script src="app.js"></script>

</body>
</html>
